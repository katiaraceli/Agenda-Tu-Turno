<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva Premium | Katia Raceli</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-diagonal"></div>
    <main class="main-container">
        
        <header class="header">
            <h1 class="titulo-dorado">AGENDA TU TURNO</h1>
            <p class="subtitulo">Gestión de citas profesional</p>
        </header>

        <nav class="tabs-nav">
            <button id="tab-agendar" class="tab-btn active" onclick="cambiarVista('agendar')">AGENDAR</button>
            <button id="tab-cancelar" class="tab-btn" onclick="cambiarVista('cancelar')">CANCELAR</button>
            <button id="tab-reprogramar" class="tab-btn" disabled title="Próximamente">REPROGRAMAR</button>
        </nav>

        <div class="card-wrapper">
            <section id="vista-agendar" class="view-content active">
                <div id="mensaje-exito" class="hidden">
                    <div class="success-box">
                        <span>✅</span>
                        <div class="success-text">
                            <p><strong>¡Reserva exitosa!</strong></p>
                            <p id="detalle-turno-exito"></p>
                        </div>
                    </div>
                </div>

                <form id="form-agenda">
                    <div class="input-group">
                        <label>Motivo</label>
                        <input type="text" id="summary" placeholder="Ej: Consulta técnica">
                    </div>
                    <div class="input-group">
                        <label>Nombre Completo</label>
                        <input type="text" id="nombreCompleto" placeholder="Ingresa tu nombre" required>
                    </div>
                    <div class="input-group">
                        <label>Email de Contacto</label>
                        <input type="email" id="email" placeholder="ejemplo@correo.com" required>
                    </div>
                    <div class="input-group">
                        <label>Fecha y Hora</label>
                        <input type="text" id="start" placeholder="Selecciona un horario" required readonly>
                        <small id="api-status" class="status-info"></small>
                    </div>
                    <button type="button" id="btn-agendar" class="btn-primary" onclick="agendarTurno()">CONFIRMAR TURNO</button>
                </form>
            </section>

            <section id="vista-cancelar" class="view-content hidden">
                <div class="gestion-container">
                    <p class="info-text">Para cancelar un turno, busca tu reserva por email.</p>
                    <div class="input-group">
                        <label>Tu Email</label>
                        <div class="search-row">
                            <input type="email" id="email-busqueda" placeholder="tu@email.com">
                            <button class="btn-search" onclick="buscarTurnos()">BUSCAR</button>
                        </div>
                    </div>
                    <div id="resultado-busqueda" class="hidden">
                        <div class="info-card-gestion">
                            <p id="res-motivo"></p>
                            <p id="res-fecha"></p>
                        </div>
                        <button class="btn-danger" onclick="solicitarCancelacion()">ELIMINAR TURNO DEFINITIVAMENTE</button>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/es.js"></script>
    <script src="script.js"></script>
</body>
</html>
