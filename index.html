<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda tu Turno</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="contenedor-principal">
        <h1 class="titulo-dorado">AGENDA TU TURNO</h1>
        
        <div class="tarjeta">
            <div class="campo">
                <label for="summary">Motivo del turno</label>
                <input type="text" id="summary" placeholder="Ej: Service de GNC">
            </div>

            <div class="campo">
                <label for="start">Fecha y Hora</label>
                <input type="datetime-local" id="start">
            </div>

           <button id="btn-agendar" class="boton-calendario" onclick="agendarTurno()">
                <span class="icono">📅</span> AGENDAR
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
